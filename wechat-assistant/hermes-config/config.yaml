# ============================================
# Hermes Agent — MCP 服务器配置
# 文档: https://hermes-agent.nousresearch.com/docs/user-guide/features/mcp
# ============================================

# MCP 服务器列表
mcp_servers:
  # ----------------------------------------
  # 数据库：SQLite（反馈收集、消息日志）
  # ----------------------------------------
  sqlite:
    command: uvx
    args:
      - mcp-server-sqlite
      - --db-path
      - "${HOME}/.hermes/data/wechat-assistant.db"
    tools:
      include:
        - query
        - execute
      resources: false
      prompts: false

  # ----------------------------------------
  # 文件系统：读写 Persona 配置和管理规则
  # ----------------------------------------
  filesystem:
    command: uvx
    args:
      - mcp-server-filesystem
      - "${HOME}/蒸馏2/wechat-assistant"
    tools:
      include:
        - read_file
        - read_directory
        - write_file
        - list_directory
      resources: true
      prompts: false

  # ----------------------------------------
  # 飞书（可选，文档同步）
  # ----------------------------------------
  # feishu:
  #   url: "https://mcp.feishu.cn"
  #   headers:
  #     Authorization: "Bearer YOUR_FEISHU_TOKEN"
  #   tools:
  #     include:
  #       - doc_create
  #       - doc_append
  #       - doc_read

  # ----------------------------------------
  # GitHub（可选，关联代码）
  # ----------------------------------------
  # github:
  #   command: uvx
  #   args:
  #     - mcp-server-github
  #   env:
  #     GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"

# ----------------------------------------
# 消息平台网关
# 完整配置在 .env 文件中
# 这里仅声明启用的平台
# ----------------------------------------
gateways:
  weixin:
    enabled: true
    type: weixin  # iLink Bot API

  wecom:
    enabled: true
    type: wecom   # Wecom Callback

# ----------------------------------------
# LLM 提供商路由
# 支持 OpenRouter / OpenAI / Anthropic / DeepSeek
# ----------------------------------------
llm:
  provider: "${LLM_PROVIDER:-deepseek}"
  model: "${LLM_MODEL:-deepseek-chat}"
  base_url: "${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
  api_key: "${DEEPSEEK_API_KEY}"

# ----------------------------------------
# 记忆系统
# ----------------------------------------
memory:
  provider: filesystem
  path: "${HOME}/.hermes/workspace"
  workspace_enabled: true

# ----------------------------------------
# 定时任务
# ----------------------------------------
scheduled_tasks:
  enabled: true
  storage: "${HOME}/.hermes/data/scheduled-tasks.json"

# ----------------------------------------
# 日志
# ----------------------------------------
logging:
  level: info
  file: "${HOME}/.hermes/logs/hermes.log"
  rotation: daily
