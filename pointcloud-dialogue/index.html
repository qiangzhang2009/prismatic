<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="assets/portrait-data.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0; width: 1920px; height: 1080px;
        overflow: hidden; background: #000;
      }
      #stage {
        position: relative; width: 1920px; height: 1080px;
        background: #000;
      }
      canvas { position: absolute; top: 0; left: 0; }
      .caption {
        position: absolute; left: 0; width: 100%;
        text-align: center; font-family: 'Georgia', serif;
        letter-spacing: 0.2em; color: rgba(255,255,255,0.9);
        text-shadow: 0 0 40px rgba(255,255,255,0.5);
      }
      #cap-opening {
        top: 76%; font-size: 18px; font-weight: 300;
        color: rgba(255,150,50,0.75); letter-spacing: 0.45em;
        text-transform: uppercase; font-family: 'Courier New', monospace;
      }
      #cap-soul {
        bottom: 100px; font-size: 38px; font-style: italic;
        color: rgba(74,144,217,0.95);
        text-shadow: 0 0 60px rgba(74,144,217,0.8);
      }
      #cap-closing {
        top: 50%; transform: translateY(-50%);
        font-size: 30px; font-weight: 300; line-height: 2.4;
        text-shadow: 0 0 80px rgba(255,150,50,0.65);
      }
      #watermark {
        bottom: 28px; font-size: 11px; color: rgba(255,255,255,0.18);
        font-family: 'Courier New', monospace; letter-spacing: 0.35em;
      }
    </style>
  </head>
  <body>
    <div id="stage" data-composition-id="main" data-start="0"
         data-duration="60" data-width="1920" data-height="1080">
      <canvas id="canvas" width="1920" height="1080"></canvas>
      <div id="cap-opening"  class="caption">&#8212; DIGITAL VOID &#8212;</div>
      <div id="cap-soul"      class="caption"></div>
      <div id="cap-closing"   class="caption">THE FUTURE<br>IS ALREADY<br>HERE</div>
      <div id="watermark"     class="caption">MUSK · VISIONARY · ARCHITECT OF TOMORROW</div>
    </div>

    <script>
    // ════════════════════════════════════════════════════════════════════════════
    //  THE PROPHET WRITTEN IN CODE — Musk · 60s · HyperFrames
    // ════════════════════════════════════════════════════════════════════════════

    (function () {
      'use strict';

      var W = 1920, H = 1080;
      var canvas = document.getElementById('canvas');
      var ctx = canvas.getContext('2d');

      // ── Seeded PRNG ──────────────────────────────────────────────────────────
      function mkRng(seed) {
        var s = seed >>> 0;
        return function () {
          s = Math.imul(1664525, s) + 1013904223 >>> 0;
          return s / 0xFFFFFFFF;
        };
      }
      var rng = mkRng(0xDEADBEEF);
      var rng2 = mkRng(0xFACEFACE);

      // ── Portrait data (from portrait-data.js via window.__PORTRAIT_DATA__) ──────
      var RAW_DATA = window.__PORTRAIT_DATA__ || [];

      // ── Layout constants ─────────────────────────────────────────────────────
      var PORT_H = H * 0.65;
      var PORT_Y = (H - PORT_H) / 2;
      var PORT_W = PORT_H * 0.72;
      var PORT_X = (W - PORT_W) / 2;
      var DUR = 60;

      // ── Build particles ────────────────────────────────────────────────────────
      var parts = RAW_DATA.map(function (entry) {
        var nx = entry[0], ny = entry[1], bri = entry[2];
        var ax = PORT_X + nx * PORT_W;
        var ay = PORT_Y + ny * PORT_H;
        var sx = rng() * W;
        var sy = rng() * H;

        var color;
        if (bri > 180) {
          color = [255, 200, 100];
        } else if (bri > 140) {
          var t140 = (bri - 140) / 40;
          color = [255, (160 + t140 * 40) | 0, (60 + t140 * 40) | 0];
        } else if (bri > 90) {
          var t90 = (bri - 90) / 50;
          color = [(220 + t90 * 35) | 0, (100 + t90 * 60) | 0, (30 + t90 * 30) | 0];
        } else if (bri > 50) {
          color = [(100 + bri) | 0, (50 + bri * 0.5) | 0, (15 + bri * 0.2) | 0];
        } else {
          color = [20, 22, 40];
        }

        // Eye region blue tint
        var isEye = ny > 0.28 && ny < 0.42 && nx > 0.30 && nx < 0.70 && bri > 80;
        if (isEye) {
          color = [(color[0] * 0.4) | 0, (color[1] * 0.65) | 0, Math.min(255, color[2] + 100)];
        }

        return {
          x: sx, y: sy, ax: ax, ay: ay, sx: sx, sy: sy,
          color: color,
          bri: bri,
          size: bri > 140 ? rng2() * 2.8 + 1.5 :
                bri > 80  ? rng2() * 1.8 + 0.8 :
                            rng2() * 1.0 + 0.3,
          layer: bri > 120 ? 2 : bri > 60 ? 1 : 0
        };
      });

      console.log('Particles loaded:', parts.length);

      // ── Background data streams ──────────────────────────────────────────────
      var STREAMS = [];
      for (var si = 0; si < 120; si++) {
        var col;
        var rnd = rng();
        if (rnd > 0.7) col = [255, 80, 20];
        else if (rnd > 0.5) col = [255, 200, 80];
        else col = [100, 160, 255];
        STREAMS.push({
          x: rng() * W,
          speed: rng() * 2.5 + 0.5,
          len: (rng() * 50 + 8) | 0,
          alpha: rng() * 0.25 + 0.03,
          col: col,
          offset: rng() * H
        });
      }

      // ── Draw helpers ─────────────────────────────────────────────────────────
      function drawGlow(x, y, color, size, alpha) {
        if (alpha < 0.005) return;
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        var r = size * 5;
        var gr = ctx.createRadialGradient(x, y, 0, x, y, r);
        gr.addColorStop(0,    'rgba(' + color[0] + ',' + color[1] + ',' + color[2] + ',' + alpha + ')');
        gr.addColorStop(0.2,  'rgba(' + color[0] + ',' + color[1] + ',' + color[2] + ',' + (alpha * 0.6).toFixed(3) + ')');
        gr.addColorStop(0.55, 'rgba(' + color[0] + ',' + color[1] + ',' + color[2] + ',' + (alpha * 0.2).toFixed(3) + ')');
        gr.addColorStop(1,    'rgba(' + color[0] + ',' + color[1] + ',' + color[2] + ',0)');
        ctx.fillStyle = gr;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawStream(s, t) {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        var y0 = ((t * s.speed + s.offset) % (H + s.len)) - s.len;
        ctx.strokeStyle = 'rgba(' + s.col[0] + ',' + s.col[1] + ',' + s.col[2] + ',' + s.alpha + ')';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(s.x, y0);
        ctx.lineTo(s.x, y0 + s.len);
        ctx.stroke();
        var gr2 = ctx.createRadialGradient(s.x, y0, 0, s.x, y0, 5);
        gr2.addColorStop(0, 'rgba(' + s.col[0] + ',' + s.col[1] + ',' + s.col[2] + ',' + (s.alpha * 2).toFixed(3) + ')');
        gr2.addColorStop(1, 'rgba(' + s.col[0] + ',' + s.col[1] + ',' + s.col[2] + ',0)');
        ctx.fillStyle = gr2;
        ctx.beginPath();
        ctx.arc(s.x, y0, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawRipple(radius, alpha) {
        if (alpha < 0.003) return;
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        var cx = W / 2, cy = H / 2;
        ctx.strokeStyle = 'rgba(74,144,217,' + (alpha * 0.7).toFixed(3) + ')';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.stroke();
        var gr3 = ctx.createRadialGradient(cx, cy, radius * 0.7, cx, cy, radius * 1.15);
        gr3.addColorStop(0, 'rgba(74,144,217,' + (alpha * 0.15).toFixed(3) + ')');
        gr3.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = gr3;
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 1.15, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // ── Easing ───────────────────────────────────────────────────────────────
      function easeOut(t)  { return 1 - Math.pow(1 - t, 3); }
      function easeIn(t)   { return t * t * t; }
      function easeInOut(t){ return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }

      // ── Phase timings ─────────────────────────────────────────────────────────
      var T = {
        VOID_END: 5, SKELETON_END: 15,
        FILL_END: 25, SOUL_END: 35,
        DISSOLVE_END: 55, CLOSING_END: 60
      };

      // ── Main render loop ──────────────────────────────────────────────────────
      var lastPhase = '';
      var frameCount = 0;

      function render(progress) {
        var t = progress * DUR;
        frameCount++;

        var phase = t < T.VOID_END ? 'void' :
                    t < T.SKELETON_END ? 'skeleton' :
                    t < T.FILL_END ? 'fill' :
                    t < T.SOUL_END ? 'soul' :
                    t < T.DISSOLVE_END ? 'dissolve' : 'closing';

        if (phase !== lastPhase) {
          ctx.fillStyle = '#000';
          ctx.fillRect(0, 0, W, H);
          lastPhase = phase;
        } else {
          ctx.fillStyle = 'rgba(0,0,0,0.10)';
          ctx.fillRect(0, 0, W, H);
        }

        // ── Data streams ──────────────────────────────────────────────────────
        var streamAlpha = t < T.SKELETON_END ? 1 :
                          t < T.SOUL_END ? 0.5 :
                          t < T.DISSOLVE_END ? 0.25 : 0.8;
        if (streamAlpha > 0.05) {
          for (var si2 = 0; si2 < STREAMS.length; si2++) {
            drawStream(STREAMS[si2], t);
          }
        }

        // ── Portrait gather/dissolve ─────────────────────────────────────────
        var gather = 0, dissolve = 0, soul = 0;

        if (t >= T.VOID_END && t < T.SKELETON_END) {
          var pt1 = easeOut((t - T.VOID_END) / (T.SKELETON_END - T.VOID_END));
          gather = pt1 * 0.45;
        } else if (t >= T.SKELETON_END && t < T.FILL_END) {
          var pt2 = easeInOut((t - T.SKELETON_END) / (T.FILL_END - T.SKELETON_END));
          gather = 0.45 + pt2 * 0.35;
        } else if (t >= T.FILL_END && t < T.SOUL_END) {
          var pt3 = easeOut((t - T.FILL_END) / (T.SOUL_END - T.FILL_END));
          gather = 0.80 + pt3 * 0.20;
          soul = pt3;
        } else if (t >= T.SOUL_END && t < T.DISSOLVE_END) {
          gather = 1; soul = 1;
        } else if (t >= T.DISSOLVE_END && t < T.CLOSING_END) {
          var pt4 = easeIn((t - T.DISSOLVE_END) / (T.CLOSING_END - T.DISSOLVE_END));
          gather = 1 - pt4;
          dissolve = pt4;
        }

        var eyeGlow = soul * (0.85 + Math.sin(t * 2.2) * 0.15);
        var breathe = 1 + soul * Math.sin(t * 1.5) * 0.025;

        // ── Draw particles ───────────────────────────────────────────────────
        var eyeYTop = PORT_Y + PORT_H * 0.28;
        var eyeYBot = PORT_Y + PORT_H * 0.42;

        for (var pi = 0; pi < parts.length; pi++) {
          var p = parts[pi];

          // Layer masking: sparse → mid → full
          var visible =
            gather < 0.5 ? p.layer === 0 :
            gather < 0.8 ? p.layer <= 1 : true;
          if (!visible) continue;

          var px, py;
          if (dissolve > 0.001) {
            var dx = p.ax - W / 2, dy = p.ay - H / 2;
            var dist = Math.sqrt(dx * dx + dy * dy) + 1;
            var burst = dissolve * H * 1.6;
            px = p.ax + (dx / dist) * burst;
            py = p.ay + (dy / dist) * burst;
          } else {
            px = p.sx + (p.ax - p.sx) * gather;
            py = p.sy + (p.ay - p.sy) * gather;
          }
          p.x = px; p.y = py;

          var alpha = gather < 0.5 ? (gather / 0.5) * 0.65 :
                      dissolve > 0.001 ? Math.max(0, 1 - dissolve * 1.3) : 0.9;
          if (alpha < 0.01) continue;

          var color = p.color;
          // Eye glow: blue shift for eye region
          var isEye = p.bri > 90 && p.y > eyeYTop && p.y < eyeYBot;
          if (eyeGlow > 0.2 && isEye) {
            color = [
              (p.color[0] * 0.35) | 0,
              (p.color[1] * 0.6) | 0,
              Math.min(255, p.color[2] + 120)
            ];
          }

          drawGlow(px, py, color, p.size * breathe, alpha);
        }

        // ── Concentric ripples (35–55s) ─────────────────────────────────────
        if (t >= T.SOUL_END && t < T.DISSOLVE_END) {
          // Center portrait glow
          var cgA = 0.35 + soul * 0.25;
          var cgr = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, H * 0.18);
          cgr.addColorStop(0, 'rgba(74,144,217,' + cgA.toFixed(3) + ')');
          cgr.addColorStop(1, 'rgba(74,144,217,0)');
          ctx.fillStyle = cgr;
          ctx.beginPath();
          ctx.arc(W / 2, H / 2, H * 0.18, 0, Math.PI * 2);
          ctx.fill();

          var rippleData = [
            { speed: 90,  start: 35.0, maxR: H * 0.65 },
            { speed: 70,  start: 36.5, maxR: H * 0.60 },
            { speed: 110, start: 38.0, maxR: H * 0.70 },
            { speed: 55,  start: 39.5, maxR: H * 0.55 },
            { speed: 130, start: 41.0, maxR: H * 0.75 },
          ];
          for (var ri = 0; ri < rippleData.length; ri++) {
            var rd = rippleData[ri];
            var age = t - rd.start;
            if (age < 0) continue;
            var r = age * rd.speed;
            var rAlpha = Math.max(0, 1 - r / rd.maxR) * 0.65;
            drawRipple(r, rAlpha);
          }
        }
      }

      // ════════════════════════════════════════════════════════════════════════════
      //  GSAP TIMELINE — synchronous registration (must be at top level)
      // ════════════════════════════════════════════════════════════════════════════
      var master = gsap.timeline({ paused: false });

      master.to({}, { duration: DUR, onUpdate: function () { render(this.progress()); }, ease: 'none' }, 0);

      // Opening: "— DIGITAL VOID —"
      master.fromTo('#cap-opening',
        { opacity: 0, y: 20 },
        { opacity: 1, y: 0, duration: 2, ease: 'power2.out' }, 0.5);
      master.to('#cap-opening',
        { opacity: 0, duration: 1.5, ease: 'power2.in', overwrite: 'auto' }, T.SKELETON_END - 0.5);

      // Soul captions (25–35s)
      master.fromTo('#cap-soul',
        { opacity: 0 },
        { opacity: 1, duration: 1.5, ease: 'power2.out', delay: 0.5, overwrite: 'auto' }, 25);
      master.call(function () { document.getElementById('cap-soul').textContent = '"The future..."'; }, [], 25.5);
      master.call(function () { document.getElementById('cap-soul').textContent = '"...calls you."'; }, [], 29);
      master.call(function () { document.getElementById('cap-soul').textContent = '"Build it."'; }, [], 32.5);
      master.to('#cap-soul',
        { opacity: 0, duration: 1.5, ease: 'power2.in', overwrite: 'auto' }, T.SOUL_END - 0.3);

      // Watermark
      master.fromTo('#watermark',
        { opacity: 0 },
        { opacity: 1, duration: 2, ease: 'power2.out', overwrite: 'auto' }, 25.5);
      master.to('#watermark',
        { opacity: 0, duration: 1.5, ease: 'power2.in', overwrite: 'auto' }, T.DISSOLVE_END - 0.5);

      // Closing (55–60s)
      master.fromTo('#cap-closing',
        { opacity: 0, scale: 0.95 },
        { opacity: 1, scale: 1, duration: 2.5, ease: 'power2.out', delay: 0.5, overwrite: 'auto' }, T.DISSOLVE_END);
      master.to('#cap-closing',
        { opacity: 0, duration: 2, ease: 'power2.in', overwrite: 'auto' }, T.CLOSING_END - 1.5);

      // Register for HyperFrames (must be synchronous)
      window.__timelines = { main: master };

      // Initial frame
      render(0);
    })();
    </script>
  </body>
</html>
