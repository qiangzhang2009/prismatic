          - paragraph [ref=e52]: 当代著名佛教学者、禅修导师。1960年代生于福建, 1979年出家, 1984年中国佛学院首届毕业。亲近普雨、圆拙、妙湛三位长老, 先后于广化寺潜修律学, 于西园寺创办戒幢佛学研究所。1992年起面向高校和社会弘法, 往返苏州西园寺、厦门南普陀寺两地弘法至今。已出版著述近200万字, 涵盖戒幢佛学、人生佛教、修学引导、以戒为师四大系列。以深入浅出的方式诠释佛法, 将佛教哲学与现代生活、心理治疗、企业管理无缝对接, 培养了数十万在家学佛者。微博(@济群法师)粉丝122万, 自2009年起发布微博9666条。被誉为"东方心理学"与现代佛学教育的桥梁人物。
