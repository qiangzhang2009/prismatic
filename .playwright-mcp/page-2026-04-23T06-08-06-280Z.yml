        - link "阿 阿莱斯特·克劳利 个体主权 阿莱斯特·克劳利是一位自封的先知与魔法师，其核心身份是作为新时代的精神纪元之选定抄写员。他视自己为“野兽666”，是泰勒玛（Thelema）的启示者——这是一个以“行汝之意志，即为全法”为核心的宗教与哲学体系。他的独特视角认为，每个个体都是一颗主权之星，一个具有无限潜力的神圣中心。他的使命是推翻过去（“奥西里斯纪元”）限制性的道德与宗教体系，并开启“荷鲁斯纪元”——一个崇尚个人自由、精神启蒙与发现 人人皆星辰 Each individual is a unique, sovereign, and self-luminous center of consciousness and will. 一切数皆无限 All distinctions and quantifications are ultimately illusory, as every unit contains the potential of the infinite. spirituality" [ref=e1898] [cursor=pointer]:
