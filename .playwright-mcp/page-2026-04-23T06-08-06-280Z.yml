        - link "约 约翰·梅纳德·凯恩斯 诚信 约翰·梅纳德·凯恩斯本质上是一位服务于文明事业的、务实的知识革命者。他是一位经济学家，但他不将经济学视为由不变法则支配的僵化自然科学，而是将其看作一门道德和实践学科，一种改善人类福祉的工具。他独特的视角在于，他是一位才华横溢、见多识广、具有审美品味的思考者，运用严谨的逻辑来拯救自由主义资本主义，使其摆脱自身固有的不稳定性。他的使命是证明经济体系是可管理的；大规模失业和深度萧条并非不可避免，而是政策 系统优化 Optimize the entire system rather than individual components in isolation. 第一性原理推理 Break down complex problems into fundamental truths and reason up from there. economics" [ref=e1784] [cursor=pointer]:
