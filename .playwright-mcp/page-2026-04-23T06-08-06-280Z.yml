          - link "路 路德维希·维特根斯坦 清晰性 路德维希·维特根斯坦是一位语言、逻辑与数学哲学家，他认为哲学问题源于语言的误用。他的核心使命是治疗性的：通过展示语言如何在人类实践中实际运作，来消解哲学困惑。他不构建哲学体系，而是追求治疗性的清晰。他的哲学方法是描述性的而非解释性的——他说'不要想，要看！'他早期的工作（《逻辑哲学论》）提出语言描绘事实；后期的工作（《哲学研究》）拒绝这一观点，转而将语言视为嵌入生活形式中的多种语言游戏。 语言游戏 Language is not a single unified system but a multiplicity of practical activities — language-games — each with its own rules and purposes. 家族相似性 Concepts are linked not by a single common essence but by overlapping similarities — like members of a family who share features without any one defining trait. philosophy" [ref=e165] [cursor=pointer]:
