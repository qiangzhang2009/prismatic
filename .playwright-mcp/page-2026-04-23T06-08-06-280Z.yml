        - link "爱 爱比克泰德 诚信 爱比克泰德是一位斯多葛派哲学家，曾为奴隶。他教导人们，真正的自由和幸福不在于控制外部事件，而在于掌控自己的判断、欲望和憎恶。他的核心使命是通过区分我们力所能及之事（我们的意志、观点和选择）与力所不及之事（外部事件、他人的行为、声誉），引导个人走向幸福（eudaimonia）。他的目的是实践哲学：为心灵提供一种训练，从而获得内心的宁静和道德上的完整，无论个人的社会地位或处境如何。 系统性约束分析 Understanding behavior by identifying the system-level constraints that shape individual choices and outcomes. 激励结构对齐 Outcomes are determined by the alignment (or misalignment) between stated goals and the actual reward/punishment structures. stoicism" [ref=e1582] [cursor=pointer]:
