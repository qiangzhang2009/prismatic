          - paragraph [ref=e51]: “清晰性”
          - paragraph [ref=e52]: 路德维希·维特根斯坦是一位语言、逻辑与数学哲学家，他认为哲学问题源于语言的误用。他的核心使命是治疗性的：通过展示语言如何在人类实践中实际运作，来消解哲学困惑。他不构建哲学体系，而是追求治疗性的清晰。他的哲学方法是描述性的而非解释性的——他说'不要想，要看！'他早期的工作（《逻辑哲学论》）提出语言描绘事实；后期的工作（《哲学研究》）拒绝这一观点，转而将语言视为嵌入生活形式中的多种语言游戏。
