name: Database Migration Safety Gate

on:
  pull_request:
    branches: [main]
    paths:
      - 'prisma/schema.prisma'
      - 'scripts/migrate-*.ts'
      - 'scripts/merge-*.ts'
      - 'scripts/reset-*.ts'
      - 'scripts/create-*.ts'
      - '.github/workflows/database-migration-gate.yml'

  push:
    branches: [main]
    paths:
      - 'prisma/schema.prisma'
      - 'scripts/migrate-*.ts'
      - 'scripts/merge-*.ts'
      - 'scripts/reset-*.ts'
      - 'scripts/create-*.ts'

env:
  NODE_VERSION: '22'

jobs:
  analyze-schema-change:
    name: '[Gate 1/2] Schema Change Analysis'
    runs-on: ubuntu-latest
    outputs:
      change_type: ${{ steps.analysis.outputs.change_type }}
      has_dangerous_changes: ${{ steps.analysis.outputs.has_dangerous_changes }}
      diff_lines: ${{ steps.diff.outputs.line_count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compute schema diff
        id: diff
        run: |
          LINE_COUNT=$(git diff main -- prisma/schema.prisma 2>/dev/null | wc -l || echo "0")
          echo "变更行数: $LINE_COUNT"
          echo "line_count=$LINE_COUNT" >> $GITHUB_OUTPUT

      - name: Analyze schema changes
        id: analysis
        run: |
          CHANGE_TYPE="safe"
          HAS_DANGEROUS="false"

          SCHEMA_DIFF=$(git diff main -- prisma/schema.prisma 2>/dev/null || echo "")

          for pattern in "DROP\s*TABLE" "DROP\s*model" "TRUNCATE" "DELETE\s+FROM\s+users" "DELETE\s+FROM\s+messages"; do
            if echo "$SCHEMA_DIFF" | grep -Ei "$pattern" > /dev/null 2>&1; then
              HAS_DANGEROUS="true"
              CHANGE_TYPE="dangerous"
              break
            fi
          done

          echo "变更类型: $CHANGE_TYPE"
          echo "危险变更: $HAS_DANGEROUS"
          echo "change_type=$CHANGE_TYPE" >> $GITHUB_OUTPUT
          echo "has_dangerous_changes=$HAS_DANGEROUS" >> $GITHUB_OUTPUT

  migration-dry-run:
    name: '[Gate 2/2] Migration Dry-Run'
    runs-on: ubuntu-latest
    needs: analyze-schema-change
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Prisma CLI
        run: npm install -g prisma

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Validate Prisma schema syntax
        run: npx prisma validate

  block-dangerous:
    name: '[Emergency] Block Dangerous Migration'
    runs-on: ubuntu-latest
    needs: analyze-schema-change
    if: needs.analyze-schema-change.outputs.has_dangerous_changes == 'true'
    steps:
      - name: Block dangerous migration
        run: |
          echo "========================================"
          echo "MIGRATION BLOCKED: Dangerous schema change detected"
          echo "========================================"
          echo "变更类型: ${{ needs.analyze-schema-change.outputs.change_type }}"
          echo "变更行数: ${{ needs.analyze-schema-change.outputs.diff_lines }}"
          echo ""
          echo "此变更包含危险操作 (DROP/TRUNCATE/DELETE)。"
          echo "请通过 PR 并获得管理员审批后合入。"
          exit 1

  safe-merge:
    name: '[Safe] Schema Change Approved'
    runs-on: ubuntu-latest
    needs: [analyze-schema-change, migration-dry-run]
    if: needs.analyze-schema-change.outputs.has_dangerous_changes == 'false'
    steps:
      - name: Approve safe schema change
        run: |
          echo "========================================"
          echo "SCHEMA CHANGE APPROVED"
          echo "========================================"
          echo "变更行数: ${{ needs.analyze-schema-change.outputs.diff_lines }}"
          echo "无危险操作，变更安全。"
